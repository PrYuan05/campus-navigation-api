server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests directly to the public IP of digiRunner
    # This exactly mimics the Vite proxy behavior
    location /api/ {
        proxy_pass http://34.180.115.60:31080;
        proxy_http_version 1.1;
        proxy_set_header Host 34.180.115.60:31080;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy OAuth token requests
    location /dgrv4/ {
        proxy_pass http://34.180.115.60:31080;
        proxy_http_version 1.1;
        proxy_set_header Host 34.180.115.60:31080;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
